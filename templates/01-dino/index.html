<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Baby Shower Brunch 👶🦖</title>

  <!-- SEO & Open Graph (previsualización al compartir en redes/WhatsApp/etc.) -->
  <!-- NOTA: estos textos son fijos para toda la plantilla, no se personalizan
       por cliente todavía — eso requeriría generar el HTML dinámicamente
       (ej. Netlify Functions con prerenderizado) antes de publicarlo.
       Por eso se deja genérico, sin nombre de ningún cliente en particular. -->
  <meta name="description" content="¡Estás invitado a un Baby Shower! Acompáñanos a celebrar esta llegada." />

  <!-- Open Graph -->
  <meta property="og:type"        content="website" />
  <meta property="og:title"       content="Baby Shower Brunch 👶🦖" />
  <meta property="og:description" content="¡Estás invitado! Acompáñanos a celebrar esta futura llegada." />
  <meta property="og:image"       content="https://res.cloudinary.com/ddqbnr9vo/image/upload/v1780436162/Share_Redes_a2ow9q.png" />
  <meta property="og:image:width"  content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- Twitter / X Card -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="Baby Shower Brunch 👶🦖" />
  <meta name="twitter:description" content="¡Estás invitado! Acompáñanos a celebrar esta futura llegada." />
  <meta name="twitter:image"       content="https://res.cloudinary.com/ddqbnr9vo/image/upload/v1780436162/Share_Redes_a2ow9q.png" />

  <!-- WhatsApp usa og: tags, no necesita nada extra -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
